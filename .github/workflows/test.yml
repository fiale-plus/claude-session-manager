name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Run daemon tests
        working-directory: daemon
        run: go test ./... -v

      - name: Build daemon
        working-directory: daemon
        run: go build -o csm-daemon .

      - name: Build TUI
        working-directory: tui
        run: go build -o csm .
